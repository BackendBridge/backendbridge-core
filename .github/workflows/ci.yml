name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install node deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run JS tests
        run: npm test --silent

  php-and-convert:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring
          coverage: none

      - name: Install composer deps for tools (including dev)
        run: cd tools && composer install --no-interaction --no-progress

      - name: Ensure node deps
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install node deps (again)
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create minimal OpenAPI contract
        run: |
          cat > ci-openapi.json <<'JSON'
          {
            "openapi": "3.0.3",
            "info": { "title": "CI Contract", "version": "1.0.0" },
            "paths": { "/users": { "get": { "responses": { "200": { "description": "ok" } } } } }
          }
          JSON

      - name: Run conversion (dry-run)
        run: |
          node ./dist/cli.js convert --to laravel --openapi ./ci-openapi.json --source . --out ./ci-out --dry-run --with-tests

      - name: Apply generated SQL migrations to SQLite (if any)
        run: |
          mkdir -p tmpdb
          DB=tmpdb/ci.db
          sqlite3 $DB "PRAGMA foreign_keys = ON;" || true
          for f in $(find ./ci-out -type f -name "*.sql" 2>/dev/null || true); do
            echo "Applying $f";
            sqlite3 $DB < "$f" || true
          done
          ls -la tmpdb || true

      - name: PHP lint generated files
        run: |
          echo "Linting generated PHP files with php -l"
          if command -v php >/dev/null 2>&1; then
            find ./ci-out -type f -name "*.php" -print0 | xargs -0 -r php -l || true
          else
            echo "php not found; skipping php -l"
          fi

      - name: Run phpstan on generated files
        run: |
          echo "Running phpstan on generated files"
          if [ -f tools/vendor/bin/phpstan ]; then
            tools/vendor/bin/phpstan analyse ./ci-out --configuration=tools/phpstan.neon --error-format=table
          else
            echo "phpstan not installed; skipping"
            exit 1
          fi

      - name: Run phpunit on generated files
        env:
          BACKENDBRIDGE_GENERATED_ROOT: ./ci-out
        run: tools/vendor/bin/phpunit --configuration tools/phpunit.xml.dist --colors=never

      - name: Upload ci-out artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-out
          path: ./ci-out

  laravel-app-integration:
    runs-on: ubuntu-latest
    needs: php-and-convert
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ci-out artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-out
          path: ./ci-out

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring

      - name: Create Laravel app
        run: |
          composer create-project --no-interaction --no-progress laravel/laravel laravel_app "^10.0"

      - name: Prepare sqlite DB and copy migrations
        run: |
          cd laravel_app
          touch database/database.sqlite
          sed -i "s/DB_CONNECTION=.*/DB_CONNECTION=sqlite/" .env || true
          sed -i "s/DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/" .env || true
          mkdir -p database/migrations
          cp -r ../ci-out/database/migrations/* database/migrations/ 2>/dev/null || true

      - name: Run artisan migrate
        run: |
          cd laravel_app
          php artisan migrate --force || true

  db-matrix:
    runs-on: ubuntu-latest
    needs: php-and-convert
    strategy:
      matrix:
        db: [mysql, postgres]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=10
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=2s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure clients
        run: |
          sudo apt-get update && sudo apt-get install -y default-mysql-client postgresql-client || true

      - name: Download ci-out artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-out
          path: ./ci-out

      - name: Wait for DB
        run: sleep 10

      - name: Apply SQL on MySQL
        if: matrix.db == 'mysql'
        env:
          MYSQL_PWD: root
        run: |
          for f in $(find ./ci-out -type f -name "*.sql" 2>/dev/null || true); do
            echo "Applying $f to MySQL";
            mysql -h 127.0.0.1 -P 3306 -u root < "$f"
          done

      - name: Apply SQL on Postgres
        if: matrix.db == 'postgres'
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE ci;" || true
          for f in $(find ./ci-out -type f -name "*.sql" 2>/dev/null || true); do
            echo "Applying $f to Postgres";
            psql -h 127.0.0.1 -U postgres -d ci -f "$f"
          done
